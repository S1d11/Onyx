<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ollama</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="side-top">
      <button id="newChatBtn" class="primary-btn" title="New chat (Ctrl+N)">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>New Chat</span>
      </button>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input id="searchInput" placeholder="Search chats" />
      </div>
    </div>
    <div id="chatList" class="chat-list"></div>
    <div class="side-bottom">
      <button id="manageModelsBtn" class="ghost-btn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Models</span>
      </button>
      <button id="settingsBtn" class="ghost-btn">
        <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-4l-.3 2.6a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.3 2.6h4l.3-2.6a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <header id="topbar">
      <button id="sidebarToggle" class="icon-btn" title="Toggle sidebar (Ctrl+B)">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div id="modelPicker" class="model-picker">
        <button id="modelBtn" class="model-btn">
          <span id="modelLabel">Select a model</span>
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        </button>
        <div id="modelMenu" class="model-menu hidden"></div>
      </div>
      <div class="spacer"></div>
      <button id="webSearchToggle" class="toggle-btn" title="Toggle web search">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" fill="none"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
        <span>Web search</span>
      </button>
      <button id="menuBtn" class="icon-btn" title="Menu">
        <svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="5" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="12" cy="19" r="1.6"/></svg>
      </button>
    </header>

    <div id="messages" class="messages"></div>

    <div id="emptyState" class="empty-state">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="56" height="56"><circle cx="12" cy="12" r="11" fill="#D97757"/><path d="M8 9c0-1.5 1.5-3 4-3s4 1.5 4 3-1.5 3-4 3" stroke="#fff" stroke-width="1.6" fill="none"/><path d="M8 9v3c0 1.5 1.5 3 4 3s4-1.5 4-3V9" stroke="#fff" stroke-width="1.6" fill="none"/></svg>
      </div>
      <h1>What can I help with?</h1>
      <div class="suggestions">
        <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing in simple terms</button>
        <button class="suggestion" data-prompt="Write a Python function to check if a string is a palindrome">Write a Python function to check if a string is a palindrome</button>
        <button class="suggestion" data-prompt="What's the latest news about AI?">What's the latest news about AI? <span class="tag">web</span></button>
        <button class="suggestion" data-prompt="Give me ideas for a weekend project">Give me ideas for a weekend project</button>
      </div>
    </div>

    <div id="composer" class="composer">
      <div class="composer-inner">
        <button id="attachBtn" class="icon-btn" title="Attach image (paste)" disabled>
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M21 12l-9 9a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5l-9 9a2 2 0 0 1-3-3l8-8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/></svg>
        </button>
        <textarea id="promptInput" rows="1" placeholder="Send a message"></textarea>
        <button id="stopBtn" class="icon-btn danger hidden" title="Stop">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor"/></svg>
        </button>
        <button id="sendBtn" class="send-btn" title="Send (Enter)">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 12l16-8-6 16-3-7-7-1z" fill="currentColor"/></svg>
        </button>
      </div>
      <div class="composer-hint">
        <label class="checkbox-line">
          <input type="checkbox" id="webSearchCheckbox" /> <span>Search the web</span>
        </label>
        <span class="hint-meta">Enter to send · Shift+Enter for newline</span>
      </div>
    </div>
  </main>
</div>

<!-- Modals -->
<div id="modalRoot" class="modal-root hidden"></div>

<script src="md.js"></script>
<script src="app.js"></script>
</body>
</html>
