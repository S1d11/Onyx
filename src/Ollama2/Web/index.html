<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ollama 2.0</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <button id="newChatBtn" class="new-chat-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>New chat</span>
      </button>
    </div>
    <div id="chatList" class="chat-list"></div>
    <div class="sidebar-footer">
      <button id="manageModelsBtn" class="sidebar-footer-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18" stroke-linecap="round"/></svg>
        <span>Models</span>
      </button>
      <button id="settingsBtn" class="sidebar-footer-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1 12h3M20 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke-linecap="round"/></svg>
        <span>Settings</span>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <!-- Top bar: just model name + sidebar toggle -->
    <header id="topbar">
      <button id="sidebarToggle" class="icon-btn" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div id="modelPicker" class="model-picker">
        <button id="modelBtn" class="model-btn">
          <span id="modelLabel">Select a model</span>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="modelMenu" class="model-menu hidden"></div>
      </div>
      <div class="spacer"></div>
      <button id="webSearchToggle" class="web-search-toggle" title="Web search">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20" stroke-linecap="round"/></svg>
      </button>
    </header>

    <!-- Messages -->
    <div id="messages" class="messages"></div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <div class="empty-logo">
        <svg viewBox="0 0 48 48" width="56" height="56"><circle cx="24" cy="24" r="22" fill="#fff" fill-opacity="0.08"/><path d="M16 20c0-4 3.5-7 8-7s8 3 8 7-3.5 7-8 7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M16 20v4c0 4 3.5 7 8 7s8-3 8-7v-4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
      </div>
      <h1>How can I help you today?</h1>
      <div class="suggestions">
        <button class="suggestion" data-prompt="Explain quantum computing in simple terms">Explain quantum computing in simple terms</button>
        <button class="suggestion" data-prompt="Write a Python function to check if a string is a palindrome">Write a Python function to check if a string is a palindrome</button>
        <button class="suggestion" data-prompt="What are the latest developments in AI?" data-web="1">What are the latest developments in AI? <span class="web-tag">web</span></button>
        <button class="suggestion" data-prompt="Give me ideas for a weekend project">Give me ideas for a weekend project</button>
      </div>
    </div>

    <!-- Composer -->
    <div id="composer" class="composer">
      <div class="composer-box">
        <textarea id="promptInput" rows="1" placeholder="Send a message..."></textarea>
        <button id="stopBtn" class="stop-btn hidden" title="Stop">
          <svg viewBox="0 0 24 24" width="16" height="16"><rect x="8" y="8" width="8" height="8" rx="1" fill="currentColor"/></svg>
        </button>
        <button id="sendBtn" class="send-btn" title="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
      <div class="composer-footer">
        <label class="web-search-label">
          <input type="checkbox" id="webSearchCheckbox" /> Search the web
        </label>
        <span class="composer-hint">Enter to send · Shift+Enter for new line</span>
      </div>
    </div>
  </main>
</div>

<div id="modalRoot" class="modal-root hidden"></div>

<script src="md.js"></script>
<script src="app.js"></script>
</body>
</html>
